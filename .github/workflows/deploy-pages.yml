name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# least privilege needed for the Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; don't cancel an in-flight publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # serve under the repo sub-path on github.io
          PAGES_BASE_PATH: /mens-fragrances

      - name: Disable Jekyll (keep _next/ asset folders)
        run: touch ./out/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
